name: smilemaker

services:
  mongo:
    image: mongo:7
    container_name: smilemaker-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep -q 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    # Published to Docker Hub (primary) and mirrored on GHCR. Team members
    # can `docker compose pull` this without building locally.
    #   Mirror: ghcr.io/amr-khaled233/smilemaker-backend:latest
    image: amrkhaled233/smilemaker-backend:latest
    container_name: smilemaker-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: 3001
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-string}
      MANAGER_PASSWORD: ${MANAGER_PASSWORD:-change-me}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    ports:
      - "3001:3001"
    # Backend bridges both networks: it talks to the DB on `db` and is
    # reached by the frontend on `web`.
    networks:
      - web
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    #   Mirror: ghcr.io/amr-khaled233/smilemaker-frontend:latest
    image: amrkhaled233/smilemaker-frontend:latest
    container_name: smilemaker-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    # Frontend only joins `web` — it has no route to the DB network.
    networks:
      - web

volumes:
  mongo-data:

networks:
  web:
    name: smilemaker-web
    driver: bridge
  db:
    name: smilemaker-db
    driver: bridge
