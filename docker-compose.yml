services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 3001
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-string}
      MANAGER_PASSWORD: ${MANAGER_PASSWORD:-change-me}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    ports:
      - "3001:3001"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mongo-data:
